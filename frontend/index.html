<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 AI Notes App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #e94560;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .form-section {
            background: #16213e;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 8px;
            background: #0f3460;
            color: #eee;
            font-size: 16px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            margin: 5px;
        }

        .btn-primary {
            background: #e94560;
            color: white;
        }

        .btn-ai {
            background: #533483;
            color: white;
        }

        .btn-delete {
            background: #c0392b;
            color: white;
        }

        .note-card {
            background: #16213e;
            padding: 20px;
            border-radius: 12px;
            margin: 10px 0;
            border-left: 4px solid #e94560;
        }

        .note-card h3 {
            color: #e94560;
            margin-bottom: 10px;
        }

        .ai-response {
            background: #0f3460;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            border-left: 4px solid #533483;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }

            100% {
                opacity: 1;
            }
        }

        .loading {
            animation: pulse 1.5s infinite;
            color: #e94560;
        }

        .ai-response strong {
            color: #533483;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🧠 AI Notes App</h1>

        <div class="form-section">
            <input type="text" id="noteTitle" placeholder="Titolo della nota...">
            <textarea id="noteContent" rows="4" placeholder="Contenuto della nota..."></textarea>
            <button class="btn-primary" onclick="createNote()">➕ Crea Nota</button>
        </div>

        <div id="notesList"></div>
    </div>

    <script>
        const API = 'http://localhost:3000/api';

        async function loadNotes() {
            const res = await fetch(`${API}/notes`);
            const notes = await res.json();
            const container = document.getElementById('notesList');
            container.innerHTML = '';

            notes.forEach(note => {
                container.innerHTML += `
                    <div class="note-card" id="note-${note.id}">
                        <h3>${note.title}</h3>
                        <p>${note.content}</p>
                        <select id="lang-${note.id}" style="padding:8px; border-radius:8px; background:#0f3460; color:#eee; border:none; margin:5px;">
                            <option value="inglese">🇬🇧 Inglese</option>
                            <option value="francese">🇫🇷 Francese</option>
                            <option value="spagnolo">🇪🇸 Spagnolo</option>
                            <option value="tedesco">🇩🇪 Tedesco</option>
                            <option value="portoghese">🇵🇹 Portoghese</option>
                            <option value="giapponese">🇯🇵 Giapponese</option>
                            <option value="cinese">🇨🇳 Cinese</option>
                            <option value="arabo">🇸🇦 Arabo</option>
                            <option value="russo">🇷🇺 Russo</option>
                            <option value="olandese">🇳🇱 Olandese</option>
                        </select>
                        <button class="btn-ai" onclick="translateNote(${note.id}, '${encodeURIComponent(note.content)}')">🌍 Traduci</button>
                        <button class="btn-ai" onclick="summarize(${note.id}, '${encodeURIComponent(note.content)}')">🤖 Riassumi</button>
                        <button class="btn-delete" onclick="deleteNote(${note.id})">🗑️ Elimina</button>
                        <div id="ai-${note.id}"></div>
                    </div>
                `;
            });
        }

        async function searchNotes() {
            const query = document.getElementById('searchBar').value.toLowerCase();
            const res = await fetch(`${API}/notes`);
            const notes = await res.json();
            const container = document.getElementById('notesList');
            container.innerHTML = '';

            const filtered = notes.filter(note =>
                note.title.toLowerCase().includes(query) ||
                note.content.toLowerCase().includes(query)
            );

            if (filtered.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#888;">😔 Nessuna nota trovata</p>';
                return;
            }

            filtered.forEach(note => {
                container.innerHTML += `
                    <div class="note-card" id="note-${note.id}">
                        <h3>${note.title}</h3>
                        <p>${note.content}</p>
                        <select id="lang-${note.id}" style="padding:8px; border-radius:8px; background:#0f3460; color:#eee; border:none; margin:5px;">
                            <option value="inglese">🇬🇧 Inglese</option>
                            <option value="francese">🇫🇷 Francese</option>
                            <option value="spagnolo">🇪🇸 Spagnolo</option>
                            <option value="tedesco">🇩🇪 Tedesco</option>
                            <option value="portoghese">🇵🇹 Portoghese</option>
                            <option value="giapponese">🇯🇵 Giapponese</option>
                            <option value="cinese">🇨🇳 Cinese</option>
                            <option value="arabo">🇸🇦 Arabo</option>
                            <option value="russo">🇷🇺 Russo</option>
                            <option value="olandese">🇳🇱 Olandese</option>
                        </select>
                        <button class="btn-ai" onclick="translateNote(${note.id}, '${encodeURIComponent(note.content)}')">🌍 Traduci</button>
                        <button class="btn-ai" onclick="summarize(${note.id}, '${encodeURIComponent(note.content)}')">🤖 Riassumi</button>
                        <button class="btn-delete" onclick="deleteNote(${note.id})">🗑️ Elimina</button>
                        <div id="ai-${note.id}"></div>
                    </div>
                `;
            });
        }

        async function createNote() {
            const title = document.getElementById('noteTitle').value;
            const content = document.getElementById('noteContent').value;
            if (!title || !content) return alert('Compila tutti i campi!');

            await fetch(`${API}/notes`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, content })
            });

            document.getElementById('noteTitle').value = '';
            document.getElementById('noteContent').value = '';
            loadNotes();
        }

        async function summarize(id, encodedContent) {
            const content = decodeURIComponent(encodedContent);
            document.getElementById(`ai-${id}`).innerHTML = '<p>🤖 L\'IA sta pensando...</p>';

            const res = await fetch(`${API}/ai/summarize`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content })
            });
            const data = await res.json();

            document.getElementById(`ai-${id}`).innerHTML = `
                <div class="ai-response">
                    <strong>🤖 Riassunto IA:</strong>
                    <p>${data.summary}</p>
                </div>
            `;
        }

        async function translateNote(id, encodedContent) {
            const content = decodeURIComponent(encodedContent);
            const langSelect = document.getElementById(`lang-${id}`);

            if (!langSelect) {
                document.getElementById(`ai-${id}`).innerHTML = `
                    <div class="ai-response">
                        <strong>❌ Errore:</strong>
                        <p>Menu lingua non trovato!</p>
                    </div>
                `;
                return;
            }

            const language = langSelect.value;
            document.getElementById(`ai-${id}`).innerHTML = `<p class="loading">🌍 Traduzione in ${language}... (può richiedere 10-30 secondi)</p>`;

            try {
                const res = await fetch(`${API}/ai/translate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content, language })
                });

                const text = await res.text();
                console.log('Risposta server:', text);

                let data;
                try {
                    data = JSON.parse(text);
                } catch (e) {
                    document.getElementById(`ai-${id}`).innerHTML = `
                        <div class="ai-response">
                            <strong>❌ Risposta non valida:</strong>
                            <p>${text}</p>
                        </div>
                    `;
                    return;
                }

                if (data.error) {
                    document.getElementById(`ai-${id}`).innerHTML = `
                        <div class="ai-response">
                            <strong>❌ Errore server:</strong>
                            <p>${data.error}</p>
                        </div>
                    `;
                    return;
                }

                document.getElementById(`ai-${id}`).innerHTML = `
                    <div class="ai-response">
                        <strong>🌍 Traduzione (${language}):</strong>
                        <p>${data.translation}</p>
                    </div>
                `;
            } catch (error) {
                document.getElementById(`ai-${id}`).innerHTML = `
                    <div class="ai-response">
                        <strong>❌ Errore connessione:</strong>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        // 👆👆👆 FINE CODICE DA AGGIUNGERE 👆👆👆

        async function deleteNote(id) {
            await fetch(`${API}/notes/${id}`, { method: 'DELETE' });
            loadNotes();
        }

        // Carica le note all'avvio
        loadNotes();
    </script>
</body>

</html>
