<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 AI Notes App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #e94560;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .form-section {
            background: #16213e;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 8px;
            background: #0f3460;
            color: #eee;
            font-size: 16px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            margin: 5px;
        }

        .btn-primary {
            background: #e94560;
            color: white;
        }

        .btn-ai {
            background: #533483;
            color: white;
        }

        .btn-delete {
            background: #c0392b;
            color: white;
        }

        .note-card {
            background: #16213e;
            padding: 20px;
            border-radius: 12px;
            margin: 10px 0;
            border-left: 4px solid #e94560;
        }

        .note-card h3 {
            color: #e94560;
            margin-bottom: 10px;
        }

        .ai-response {
            background: #0f3460;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            border-left: 4px solid #533483;
        }

        .ai-response strong {
            color: #533483;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🧠 AI Notes App</h1>

        <div class="form-section">
            <input type="text" id="noteTitle" placeholder="Titolo della nota...">
            <textarea id="noteContent" rows="4" placeholder="Contenuto della nota..."></textarea>
            <button class="btn-primary" onclick="createNote()">➕ Crea Nota</button>
        </div>

        <div id="notesList"></div>
    </div>

    <script>
        const API = 'http://localhost:3000/api';

        async function loadNotes() {
            const res = await fetch(`${API}/notes`);
            const notes = await res.json();
            const container = document.getElementById('notesList');
            container.innerHTML = '';

            notes.forEach(note => {
                container.innerHTML += `
                    <div class="note-card" id="note-${note.id}">
                        <h3>${note.title}</h3>
                        <p>${note.content}</p>
                        <button class="btn-ai" onclick="summarize(${note.id}, '${encodeURIComponent(note.content)}')">🤖 Riassumi con IA</button>
                        <button class="btn-delete" onclick="deleteNote(${note.id})">🗑️ Elimina</button>
                        <div id="ai-${note.id}"></div>
                    </div>
                `;
            });
        }

        async function createNote() {
            const title = document.getElementById('noteTitle').value;
            const content = document.getElementById('noteContent').value;
            if (!title || !content) return alert('Compila tutti i campi!');

            await fetch(`${API}/notes`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, content })
            });

            document.getElementById('noteTitle').value = '';
            document.getElementById('noteContent').value = '';
            loadNotes();
        }

        async function summarize(id, encodedContent) {
            const content = decodeURIComponent(encodedContent);
            document.getElementById(`ai-${id}`).innerHTML = '<p>🤖 L\'IA sta pensando...</p>';

            const res = await fetch(`${API}/ai/summarize`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content })
            });
            const data = await res.json();

            document.getElementById(`ai-${id}`).innerHTML = `
                <div class="ai-response">
                    <strong>🤖 Riassunto IA:</strong>
                    <p>${data.summary}</p>
                </div>
            `;
        }

        async function deleteNote(id) {
            await fetch(`${API}/notes/${id}`, { method: 'DELETE' });
            loadNotes();
        }

        // Carica le note all'avvio
        loadNotes();
    </script>
</body>

</html>
